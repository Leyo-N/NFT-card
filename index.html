<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="stylesheet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | NFT preview card component</title>

</head>
<body>
  <main>
    <div class="card">
      <div class="container">
        <img src="images/image-equilibrium.jpg" alt="clear cube with light shining through" class="nft-icon">
        <div class="overlay"></div>
        <img src="images/icon-view.svg" class="view" aria-hidden="true">
      </div>

      <h1>Equilibrium #3429</h1>

      <div class="nft-info">
        <p>Our Equilibrium collection promotes balance and calm.</p>
      </div>

      <div class="price">
        <div class="amount">
          <img src="images/icon-ethereum.svg" aria-hidden="true"><p>0.041 ETH</p>
        </div>

        <div class="time">
          <img src="images/icon-clock.svg" aria-hidden="true"><p>3 days left</p>
        </div>
      </div>

      <div class="author">
        <img src="images/image-avatar.png" alt="profile picture"><p><span class="grayed">Creation of</span> <span class="credit">Jules Wyvern</span></p>
      </div>

    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Leyo-N" target="_blank">Leyo Outlaw</a>.
  </footer>
</body>
</html>
